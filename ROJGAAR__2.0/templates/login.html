<!DOCTYPE html>
<html>
<head>

<title>Login - ROJGAAR 2.0</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<form method="POST"
class="bg-white p-8 rounded shadow-md w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Login
</h2>

<input
name="email"
type="email"
placeholder="Email"
class="w-full border p-3 mb-4 rounded"
/>

<input
name="password"
type="password"
placeholder="Password"
class="w-full border p-3 mb-4 rounded"
/>

<button
class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">

Login

</button>

<p class="mt-4 text-center text-sm">
Don't have account?
<a href="/signup" class="text-blue-600">Signup</a>
</p>

</form>

</body>
</html>
