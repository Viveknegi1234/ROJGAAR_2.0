<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
{% extends "base.html" %}
{% include "sidebar.html" %}
{% block content %}
  <h1>Your Profile</h1>

  <form method="POST" action="{{ url_for('profile') }}">
    <label>Username</label>
    <input type="text" name="username" value="{{ user.username }}" readonly>

    <label>Full Name</label>
    <input type="text" name="full_name" value="{{ user.full_name or '' }}">

    <label>Email</label>
    <input type="email" name="email" value="{{ user.email or '' }}">

    <label>Skills (for workers)</label>
    <input type="text" name="skills" value="{{ user.skills or '' }}" placeholder="Comma separated">

    <label>Bio</label>
    <textarea name="bio" rows="4">{{ user.bio or '' }}</textarea>

    <button type="submit">Save Profile</button>
  </form>
{% endblock %}
