<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>ROJGAAR 2.0 Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f1f5f9;
}

.card{
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 25px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="bg-white shadow flex justify-between items-center px-8 py-4">

<h1 class="text-2xl font-bold text-blue-600">
ROJGAAR 2.0
</h1>

<div class="flex items-center space-x-4">

<span class="font-medium">
{{user_name}}
</span>

<a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded">
Logout
</a>

</div>

</nav>

<div class="flex">

<!-- SIDEBAR -->
<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div class="w-64 bg-white shadow-lg flex-shrink-0">

        <div class="p-6 text-xl font-bold">
            ROJGAAR
        </div>

        <ul class="space-y-4 p-6">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/post-job">Post Job</a></li>
            <li><a href="/find-workers">Find Workers</a></li>
            <li><a href="/messages">Messages</a></li>
            <li><a href="/profile">Profile</a></li>
        </ul>

    </div>

 


<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h2 class="text-3xl font-bold mb-8">
Dashboard
</h2>

<!-- STATS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

<div class="card bg-white p-6 rounded-xl shadow">

<h3 class="text-gray-500">
Total Workers live 
</h3>

<p class="text-2xl font-bold text-blue-600">
125
</p>

</div>

<div class="card bg-white p-6 rounded-xl shadow">

<h3 class="text-gray-500">
Jobs Posted live 
</h3>

<p class="text-2xl font-bold text-green-600">
48
</p>

</div>


</div>

<!-- WORKER SECTION -->

<h3 class="text-2xl font-semibold mb-6">
Available Workers
</h3>

<div id="workers" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

</div>

</div>

</div>

<script>

async function loadWorkers(){

let res = await fetch("/api/workers")

let workers = await res.json()

let container = document.getElementById("workers")

container.innerHTML=""

workers.forEach(w=>{

container.innerHTML += `

<div class="card bg-white p-6 rounded-xl shadow">

<div class="flex items-center space-x-4">

<img src="${w.photo}" class="w-14 h-14 rounded-full">

<div>

<h4 class="font-semibold">${w.name}</h4>

<p class="text-gray-500 text-sm">${w.skills}</p>

</div>

</div>

<p class="mt-3 text-gray-700">
Daily Wage: ₹${w.daily_wage}
</p>

<p class="text-yellow-500">
⭐ ${w.rating}
</p>

<button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
View Profile
</button>

</div>

`

})

}

loadWorkers()

</script>

</body>

</html>
