<!DOCTYPE html>
<html>
<head>

<title>Employer Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-blue-600 text-white p-4 flex justify-between">

<h1 class="text-xl font-bold">
ROJGAAR 2.0 Employer
</h1>
<h2>Employer Dashboard</h2>

<a href="/map">
    <button>Find Workers Near Me</button>
</a>

<div>
{{user_name}}
<a href="/logout" class="ml-4 bg-red-500 px-3 py-1 rounded">Logout</a>
</div>

</nav>

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-white h-screen shadow p-6">

<ul class="space-y-6">

<li class="font-semibold text-blue-600">Dashboard</li>
<li><a href="/post-job">Post Job</a></li>
<li><a href="/find-workers">Find Workers</a></li>
<li><a href="/messages">Messages</a></li>
<li><a href="/employer-profile">Profile</a></li>



</ul>

</div>

<!-- MAIN -->

<div class="flex-1 p-10">

<h2 class="text-3xl font-bold mb-6">
Employer Dashboard
</h2>

<div class="grid grid-cols-3 gap-6 mb-10">

<div class="bg-white p-6 rounded shadow">
<h3>Total Jobs Posted</h3>
<p class="text-2xl font-bold">15</p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3>Workers Hired</h3>
<p class="text-2xl font-bold">7</p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3>Applications</h3>
<p class="text-2xl font-bold">23</p>
</div>

</div>

<h3 class="text-xl font-semibold mb-4">
Find Workers
</h3>

<div id="workers" class="grid grid-cols-3 gap-6"></div>

</div>

</div>

<script>

async function loadWorkers(){

let res = await fetch("/api/workers")
let workers = await res.json()

let container = document.getElementById("workers")

workers.forEach(w=>{

container.innerHTML += `

<div class="bg-white p-6 rounded shadow hover:shadow-lg">

<img src="${w.photo}" class="w-16 h-16 rounded-full">

<h4 class="font-semibold mt-2">${w.name}</h4>

<p>${w.skills}</p>

<p class="text-green-600 font-bold">
₹ ${w.daily_wage}/day
</p>

<div class="bg-white p-6 rounded shadow">

<h4 class="font-semibold text-lg mb-2">Worker Name</h4>

<p class="text-gray-600 mb-3">Electrician</p>

<button onclick="hireWorker()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Hire
</button>

</div>


</div>

`

})

}

loadWorkers()

</script>
<script src="/static/js/script.js"></script>

</body>
</html>
